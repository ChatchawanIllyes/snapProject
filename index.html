<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMPROVE.</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="site-nav">
    <div class="nav-logo">IMPROVE.</div>
    <input
      class="search-input"
      id="search-input"
      type="text"
      placeholder="Search achievements..."
      oninput="searchAchievements(this.value)"
    />
  </nav>

  <div class="add-bar">
    <input id="add-title" type="text" placeholder="Achievement title"
      onkeydown="if(event.key==='Enter') addAchievement()" />
    <select id="add-category">
      <option value="fitness">Fitness</option>
      <option value="academic">Academic</option>
      <option value="entertainment">Entertainment</option>
      <option value="career">Career</option>
    </select>
    <input id="add-difficulty" type="number" min="1" max="10" placeholder="Difficulty 1–10" />
    <button class="btn-add" onclick="addAchievement()">+ ADD</button>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#111111"></div>Fitness</div>
    <div class="legend-item"><div class="legend-dot" style="background:#444444"></div>Academic</div>
    <div class="legend-item"><div class="legend-dot" style="background:#777777"></div>Entertainment</div>
    <div class="legend-item"><div class="legend-dot" style="background:#AAAAAA"></div>Career</div>
  </div>

  <main class="tree-main" id="tree-main">
    <p class="tree-empty-msg">Add your first achievement above to grow the tree.</p>
    <svg id="tree-svg" preserveAspectRatio="xMidYMin meet"></svg>
  </main>

  <div id="side-panel" class="side-panel hidden">
    <button class="panel-close" onclick="closePanel()">✕</button>
    <span class="panel-category" id="panel-category"></span>
    <div id="panel-image" style="display:none">
      <img id="panel-img-tag" style="width:100%; border-radius:3px;" />
    </div>
    <h2 id="panel-title"></h2>
    <div class="panel-meta">
      <span id="panel-date"></span>
      <span id="panel-difficulty"></span>
      <div class="difficulty-bar-track">
        <div class="difficulty-bar-fill" id="panel-difficulty-bar" style="width: 0%"></div>
      </div>
    </div>
    <textarea class="panel-edit" id="panel-description" placeholder="Add a description..." oninput="saveField('description', this.value)"></textarea>
    <div class="panel-result-box">
      <span class="panel-result-label">RESULT</span>
      <textarea class="panel-edit" id="panel-result" placeholder="Add a result..." oninput="saveField('result', this.value)"></textarea>
    </div>
    <button class="btn-remove" onclick="removeSelected()">Remove Achievement</button>
  </div>

  <section class="catalog-section">
    <div class="catalog-header">
      <span class="catalog-title">ALL ACHIEVEMENTS</span>
    </div>
    <div id="catalog-body">
      <p class="catalog-empty">No achievements yet.</p>
    </div>
  </section>

  <script src="scripts.js"></script>
</body>
</html>
